services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: infacts
      POSTGRES_PASSWORD: infacts
      POSTGRES_DB: infacts
    ports:
      # Host 5433 to avoid clashing with other local Postgres instances.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infacts -d infacts"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      API_PORT: "3030"
      DATABASE_URL: postgresql://infacts:infacts@postgres:5432/infacts
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "3030:3030"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      # Override with WEB_PORT if 5173 is taken by a dev server.
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api

volumes:
  pgdata:
